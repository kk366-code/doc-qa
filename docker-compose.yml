services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdemo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  app:
    build: ./backend
    ports:
      - "8501:8501"
    env_file:
      - path: .env
        required: false
    environment:
      # DATABASE_URL is set here (not in .env) because it uses the Docker service name
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ragdemo
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # app_venv 削除: /venv はイメージレイヤー内に存在し、ホストマウントに上書きされない
      # Vertex AI を Docker 内で使う場合: 下記を有効化（事前に gcloud auth application-default login を実行）
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    networks:
      - app_net

volumes:
  pgdata:

networks:
  app_net:
    driver: bridge
